<main class="flex min-h-screen items-center justify-center bg-[var(--app-bg)] px-4 py-8">
  <section class="w-full max-w-sm rounded-xl bg-[var(--app-surface)] p-6 shadow-sm ring-1 ring-[var(--app-border)]">
    <div class="mb-5 flex flex-col items-center gap-2">
      <img src="/favicon.ico" alt="" class="h-10 w-10 rounded-lg" />
      <p class="text-sm font-semibold text-[var(--app-text)]">Seb's Perfumes</p>
    </div>

    <h1 class="text-center text-2xl font-semibold text-[var(--app-text)]">
      Iniciar sesion
    </h1>
    <p class="mt-1 text-center text-sm text-[var(--app-text-muted)]">
      Accede con tu usuario y contrasena
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      @if (loginError) {
        <p
          role="alert"
          aria-live="assertive"
          class="rounded-lg bg-[var(--app-danger-surface)] px-3 py-2 text-sm text-[var(--app-danger)] ring-1 ring-[var(--app-danger)]"
        >
          {{ loginError }}
        </p>
      }

      <mat-form-field class="w-full" appearance="outline">
        <mat-label>Origen de datos</mat-label>
        <mat-select formControlName="dataSource" [disabled]="isSubmitting()">
          <mat-option value="prod">Produccion</mat-option>
          <mat-option value="historic">Historico</mat-option>
        </mat-select>
      </mat-form-field>

      <app-text-field
        label="Usuario"
        autocomplete="username"
        [control]="loginForm.controls.username"
        [showErrors]="submitted"
        [errorMessages]="{ required: 'Usuario es obligatorio.' }"
      />

      <app-text-field
        label="Contrasena"
        type="password"
        autocomplete="current-password"
        [control]="loginForm.controls.password"
        [showErrors]="submitted"
        [errorMessages]="{ required: 'Contrasena es obligatoria.' }"
      />

      <app-button
        variant="primary"
        type="submit"
        [fullWidth]="true"
        [loading]="isSubmitting()"
      >
        Entrar
      </app-button>
    </form>
  </section>
</main>
