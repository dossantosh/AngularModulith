<main class="flex min-h-screen items-center justify-center bg-gray-100 px-4 py-8 dark:bg-slate-950">
  <section class="w-full max-w-sm rounded-xl bg-white p-6 shadow-sm ring-1 ring-gray-200 dark:bg-gray-900 dark:ring-gray-800">
    <h1 class="text-center text-2xl font-semibold text-gray-950 dark:text-gray-50">
      Iniciar sesion
    </h1>
    <p class="mt-1 text-center text-sm text-gray-500 dark:text-gray-400">
      Accede con tu usuario y contrasena
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      @if (loginError) {
        <p
          role="alert"
          class="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-200"
        >
          {{ loginError }}
        </p>
      }

      <mat-form-field class="w-full" appearance="outline">
        <mat-label>Origen de datos</mat-label>
        <mat-select formControlName="dataSource" [disabled]="isSubmitting()">
          <mat-option value="prod">Produccion</mat-option>
          <mat-option value="historic">Historico</mat-option>
        </mat-select>
      </mat-form-field>

      <app-text-field
        label="Usuario"
        autocomplete="username"
        [control]="loginForm.controls.username"
        [showErrors]="submitted"
        [errorMessages]="{ required: 'Usuario es obligatorio.' }"
      />

      <app-text-field
        label="Contrasena"
        type="password"
        autocomplete="current-password"
        [control]="loginForm.controls.password"
        [showErrors]="submitted"
        [errorMessages]="{ required: 'Contrasena es obligatoria.' }"
      />

      <app-button
        variant="primary"
        type="submit"
        [fullWidth]="true"
        [loading]="isSubmitting()"
      >
        Entrar
      </app-button>
    </form>
  </section>
</main>
