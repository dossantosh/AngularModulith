<app-page
  title="Usuarios"
  subtitle="Consulta usuarios, revisa su estado y accede a su ficha de gestion."
  eyebrow="Sistemas"
  layout="full"
  [breadcrumbs]="breadcrumbs"
>
  <form aria-label="Busqueda de usuarios" [formGroup]="filtersForm">
    <app-search-filters title="Busqueda" subtitle="Busca por codigo, usuario o correo.">
      <app-button
        search-filter-actions
        variant="secondary"
        type="button"
        [disabled]="loading()"
        (clicked)="clearFilters()"
      >
        Limpiar
      </app-button>

      <app-text-field
        label="Codigo"
        type="number"
        inputMode="numeric"
        [control]="filtersForm.controls.id"
      ></app-text-field>

      <app-text-field
        label="Usuario"
        autocomplete="username"
        [control]="filtersForm.controls.username"
      ></app-text-field>

      <app-text-field
        class="sm:col-span-2 lg:col-span-1"
        label="Correo"
        type="email"
        autocomplete="email"
        [control]="filtersForm.controls.email"
      ></app-text-field>
    </app-search-filters>
  </form>

  <div class="mt-4">
    <app-search-results
      title="Resultados"
      subtitle="Usuarios que coinciden con tu busqueda."
      loadingMessage="Cargando usuarios..."
      errorTitle="No se pudieron cargar los usuarios"
      emptyIcon="person_search"
      emptyTitle="Sin usuarios"
      emptyMessage="No hay usuarios para la busqueda actual."
      paginationAriaLabel="Paginacion de usuarios"
      previousAriaLabel="Cargar pagina anterior de usuarios"
      nextAriaLabel="Cargar pagina siguiente de usuarios"
      [loading]="loading()"
      [empty]="users().length === 0"
      [error]="error()"
      [previousDisabled]="!hasPrevious() || loading()"
      [nextDisabled]="!hasNext() || loading()"
      (retry)="searchUsers()"
      (previous)="loadPrevious()"
      (next)="loadNext()"
    >
      <app-button empty-actions variant="secondary" type="button" (clicked)="clearFilters()">
        Limpiar busqueda
      </app-button>

      <div class="overflow-x-auto">
        <table
          mat-table
          [dataSource]="users()"
          id="users-results-table"
          aria-label="Listado de usuarios encontrados"
          [attr.aria-busy]="loading()"
          class="users-results-table min-w-full"
        >
          <caption class="sr-only">
            Listado de usuarios encontrados
          </caption>

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__id">Codigo</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__id app-text-muted">
              {{ user.id }}
            </td>
          </ng-container>

          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__username">Usuario</th>
            <td
              mat-cell
              *matCellDef="let user"
              class="users-results-table__username font-medium app-text"
            >
              {{ user.username }}
            </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__email">Correo</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__email app-text-muted">
              {{ user.email }}
            </td>
          </ng-container>

          <ng-container matColumnDef="enabled">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__status">Estado</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__status">
              <app-status-badge
                [label]="user.enabled ? 'Activo' : 'Inactivo'"
                [icon]="user.enabled ? 'check_circle' : 'cancel'"
                [variant]="user.enabled ? 'success' : 'danger'"
              ></app-status-badge>
            </td>
          </ng-container>

          <ng-container matColumnDef="admin">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__admin">Perfil</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__admin">
              <app-status-badge
                [label]="user.isAdmin ? 'Administrador' : 'Usuario'"
                [icon]="user.isAdmin ? 'shield_person' : 'person'"
                [variant]="user.isAdmin ? 'info' : 'neutral'"
              ></app-status-badge>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__actions">Acciones</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__actions">
              <a
                mat-icon-button
                [routerLink]="userDetailsLink(user.id)"
                [attr.aria-label]="'Abrir usuario ' + user.username"
                [attr.title]="'Abrir usuario ' + user.username"
                class="users-results-table__action-link"
              >
                <mat-icon aria-hidden="true">manage_accounts</mat-icon>
              </a>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </app-search-results>
  </div>
</app-page>
