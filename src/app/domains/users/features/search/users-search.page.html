<app-page
  title="Usuarios"
  subtitle="List report operativo con busqueda incremental, estados claros y tabla compacta."
  eyebrow="Administracion"
  layout="full"
  [breadcrumbs]="breadcrumbs"
>
  <form
    aria-label="Filtros de busqueda de usuarios"
    [formGroup]="filtersForm"
  >
    <app-search-filters title="Filtros" subtitle="La busqueda se actualiza automaticamente al escribir.">
      <app-button
        search-filter-actions
        variant="secondary"
        type="button"
        [disabled]="facade.loading()"
        (clicked)="clearFilters()"
      >
        Limpiar
      </app-button>

      <app-text-field label="ID" type="number" inputMode="numeric" [control]="filtersForm.controls.id" />

      <app-text-field label="Username" autocomplete="username" [control]="filtersForm.controls.username" />

      <app-text-field
        class="sm:col-span-2 lg:col-span-1"
        label="Email"
        type="email"
        autocomplete="email"
        [control]="filtersForm.controls.email"
      />
    </app-search-filters>
  </form>

  <div class="mt-4">
    <app-search-results
      title="Resultados"
      subtitle="Tabla densa para lectura rapida y acciones futuras."
      loadingMessage="Cargando usuarios..."
      errorTitle="No se pudieron cargar los usuarios"
      emptyIcon="person_search"
      emptyTitle="Sin usuarios"
      emptyMessage="No hay usuarios para los filtros actuales."
      paginationAriaLabel="Paginacion de usuarios"
      previousAriaLabel="Cargar pagina anterior de usuarios"
      nextAriaLabel="Cargar pagina siguiente de usuarios"
      [loading]="facade.loading()"
      [empty]="facade.users().length === 0"
      [error]="facade.error()"
      [previousDisabled]="!facade.hasPrevious() || facade.loading()"
      [nextDisabled]="!facade.hasNext() || facade.loading()"
      (retry)="searchUsers()"
      (previous)="loadPrevious()"
      (next)="loadNext()"
    >
      <app-button empty-actions variant="secondary" type="button" (clicked)="clearFilters()">
        Limpiar filtros
      </app-button>

      <div class="overflow-x-auto">
        <table
          mat-table
          [dataSource]="facade.users()"
          id="users-results-table"
          aria-label="Listado de usuarios encontrados"
          [attr.aria-busy]="facade.loading()"
          class="users-results-table min-w-full"
        >
          <caption class="sr-only">
            Listado de usuarios encontrados
          </caption>

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__id">ID</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__id app-text-muted">
              {{ user.id }}
            </td>
          </ng-container>

          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__username">Username</th>
            <td
              mat-cell
              *matCellDef="let user"
              class="users-results-table__username font-medium app-text"
            >
              {{ user.username }}
            </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__email">Email</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__email app-text-muted">
              {{ user.email }}
            </td>
          </ng-container>

          <ng-container matColumnDef="enabled">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__status">Enabled</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__status">
              <app-status-badge
                [label]="user.enabled ? 'Activo' : 'Inactivo'"
                [icon]="user.enabled ? 'check_circle' : 'cancel'"
                [variant]="user.enabled ? 'success' : 'danger'"
              />
            </td>
          </ng-container>

          <ng-container matColumnDef="admin">
            <th mat-header-cell *matHeaderCellDef class="users-results-table__admin">Admin</th>
            <td mat-cell *matCellDef="let user" class="users-results-table__admin">
              <app-status-badge
                [label]="user.isAdmin ? 'Admin' : 'Usuario'"
                [icon]="user.isAdmin ? 'shield_person' : 'person'"
                [variant]="user.isAdmin ? 'info' : 'neutral'"
              />
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </app-search-results>
  </div>
</app-page>
